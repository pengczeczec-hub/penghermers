# Hermes 編排設定（不含密鑰；密鑰僅來自環境變數）

github:
  # 推送與部署目標（須在 GitHub 已建立此倉庫）
  repo_url: https://github.com/pengczeczec-hub/penghermers.git
  branch: main
  # 若改為 auto-news-site，請先在 GitHub 建立空倉庫再改網址
  # 本機 git remote 名稱（測試腳本可新增 deploy 指向 repo_url）
  remote_name: deploy

cloudflare:
  # 剪報靜態輸出目錄（本機 / CI 的 hermers-pipeline、review 仍使用）
  # Worker 部署改走 pywrangler，見 wrangler.toml 與 docs/CLOUDFLARE_WORKER.md
  output_dir: dist

cursor:
  # 任務佇列目錄（Cursor Agent 讀取並執行）
  tasks_pending: tasks/pending
  tasks_done: tasks/done
