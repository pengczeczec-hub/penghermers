# 複製為 config/domains.yaml 後依領域修改
# max_items: 全域精選幾則（依市場影響力排序後截取）
# fetch_pool: 各網域 RSS 先取幾則候選再做全域排序（建議為 max_items 的數倍）
max_items: 5
fetch_pool: 40

domains:
  - id: tech
    name: 科技熱門
    keywords: []  # 可填 AI, 晶片 等，空白表示不過濾標題
    rss:
      - https://hnrss.org/frontpage
      - https://feeds.arstechnica.com/arstechnica/index
