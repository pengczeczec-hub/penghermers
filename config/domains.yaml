    name: 台股與集中市場
    section_zh: 市場消息
    section_en: Market news
    keywords:
      - 台股
      - 股價
      - 股市
      - 大盤
      - 加權
      - 櫃買
      - 上市
      - 上櫃
      - 興櫃
      - 股利
      - 除息
      - 除權
      - 半導體
      - 台積
      - 營收
      - 財報
      - 法說
      - 籌碼
      - 外資
      - 投信
      - 自營
      - 標案
      - 訂單
      - 合約
      - ETF
      - 0050
    rss:
      - https://news.cnyes.com/rss/v1/news/category/tw_stock
  - id: tw_market_extra
    name: 重大頭條（股市相關）
    section_zh: 重大頭條
    section_en: Major headlines
    keywords:
      - 股
      - 台股
      - 加權
      - 櫃買
      - 成交值
      - 台積
