<!DOCTYPE html>
<html lang="zh-Hant" data-hermers-title-zh="台股新聞與行情快訊" data-hermers-title-en="Taiwan Stock News &amp; Market Highlights">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="台股與集中市場相關新聞剪報。 Taiwan stock-market news clippings." />
  <meta property="og:title" content="台股新聞與行情快訊 | Taiwan Stock News &amp; Market Highlights" />
  <meta property="og:description" content="台股與集中市場相關新聞剪報。 Taiwan stock-market news clippings." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_TW" />
  <meta property="og:locale:alternate" content="en_US" />
  <link rel="canonical" href="https://penghermers.pengczeczec.workers.dev/" />
  <link rel="alternate" hreflang="zh-Hant" href="https://penghermers.pengczeczec.workers.dev/" />
  <link rel="alternate" hreflang="en" href="https://penghermers.pengczeczec.workers.dev/" />
  <link rel="alternate" hreflang="x-default" href="https://penghermers.pengczeczec.workers.dev/" />
  <meta property="og:url" content="https://penghermers.pengczeczec.workers.dev/" />
  <title>台股新聞與行情快訊</title>
  <style>
  :root {
    --bg: #f4f2ee;
    --surface: #fffcf7;
    --surface-elev: #ffffff;
    --ink: #1c1917;
    --muted: #78716c;
    --muted2: #a8a29e;
    --border: #e7e5e0;
    --accent: #0f766e;
    --accent-soft: rgba(15, 118, 110, 0.12);
    --accent-hover: #0d5c56;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 0 rgba(28, 25, 23, 0.04), 0 4px 16px rgba(28, 25, 23, 0.06);
    --font-sans: ui-sans-serif, system-ui, "Segoe UI", "Noto Sans TC", "PingFang TC",
      "Microsoft JhengHei", sans-serif;
    --font-display: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino,
      "Noto Serif TC", "Source Han Serif TC", Georgia, "Times New Roman", serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-sans);
    font-size: 1rem;
    line-height: 1.65;
    color: var(--ink);
    background: var(--bg);
    background-image: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(15, 118, 110, 0.08), transparent 55%);
    -webkit-font-smoothing: antialiased;
  }
  a {
    color: var(--accent);
    text-decoration: none;
    text-underline-offset: 0.12em;
  }
  a:hover { color: var(--accent-hover); text-decoration: underline; }
  code {
    font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", Consolas, monospace;
    font-size: 0.88em;
    background: rgba(28, 25, 23, 0.06);
    padding: 0.12em 0.35em;
    border-radius: 4px;
  }

  .lang-switch {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 50;
    display: flex;
    gap: 0.35rem;
    background: var(--surface-elev, #fff);
    border: 1px solid var(--border, #e7e5e0);
    border-radius: 999px;
    padding: 0.2rem;
    box-shadow: var(--shadow, 0 2px 8px rgba(0,0,0,0.08));
  }
  .lang-switch .lang-btn {
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted, #78716c);
    font: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.35rem 0.65rem;
    border-radius: 999px;
    line-height: 1;
  }
  .lang-switch .lang-btn:hover { color: var(--accent-hover, #0d5c56); }
  .lang-switch .lang-btn[aria-pressed="true"] {
    background: var(--accent-soft, rgba(15, 118, 110, 0.12));
    color: var(--ink, #1c1917);
  }
  html[lang="en"] .hermers-i18n-zh { display: none !important; }
  html[lang="zh-Hant"] .hermers-i18n-en { display: none !important; }

  main {
    max-width: min(54rem, 100% - 2rem);
    margin: 0 auto;
    padding: clamp(1.5rem, 4vw, 2.75rem) 1rem 3rem;
  }

  .masthead {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .masthead h1 {
    font-family: var(--font-display);
    font-size: clamp(1.55rem, 3.5vw, 2rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 0.35rem;
    line-height: 1.2;
  }
  .sub {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--surface-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.35rem 0.85rem;
    font-size: 0.82rem;
    color: var(--muted);
    box-shadow: var(--shadow);
  }
  .pill strong { color: var(--ink); font-weight: 600; }
  .list-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .category-block + .category-block {
    border-top: 1px solid var(--border);
  }
  .category-title {
    margin: 0;
    padding: 0.85rem 1.15rem 0.45rem;
    font-family: var(--font-display);
    font-size: 1.08rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
    background: rgba(15, 118, 110, 0.06);
    border-bottom: 1px solid var(--border);
  }
  .category-title span { display: inline-block; }
  .post-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .post-list li {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
  }
  .post-list li:last-child { border-bottom: none; }
  .post-list li:hover { background: rgba(15, 118, 110, 0.04); }
  .post-list a {
    display: block;
    padding: 0.95rem 1.15rem 0.35rem;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
  }
  .post-list a:hover { color: var(--accent-hover); text-decoration: none; }
  .meta {
    display: block;
    padding: 0 1.15rem 0.95rem;
    font-size: 0.8rem;
    color: var(--muted2);
    letter-spacing: 0.02em;
  }
  .empty {
    margin: 0;
    padding: 2rem 1.25rem;
    color: var(--muted);
    text-align: center;
  }
  footer.time {
    margin-top: 2rem;
    font-size: 0.78rem;
    color: var(--muted2);
  }

  </style>
</head>
<body>
  <div class="lang-switch" role="group" aria-label="介面語言 / Language">
  <button type="button" class="lang-btn" data-set-lang="zh-Hant" aria-pressed="true">繁中</button>
  <button type="button" class="lang-btn" data-set-lang="en" aria-pressed="false">English</button>
</div>
  <main>
    <header class="masthead">
      <h1><span data-i18n-zh="台股新聞與行情快訊" data-i18n-en="Taiwan Stock News & Market Highlights"></span></h1>
      <p class="sub"><span data-i18n-zh="台股與集中市場相關新聞剪報。"
        data-i18n-en="Taiwan stock-market news clippings."></span></p>
      <div class="stats">
        <span class="pill"><span data-i18n-zh="待審" data-i18n-en="Pending"></span>
          <strong>0</strong>
          <span data-i18n-zh="則" data-i18n-en="items"></span></span>
        <span class="pill"><span data-i18n-zh="已發布" data-i18n-en="Published"></span>
          <strong>0</strong>
          <span data-i18n-zh="則" data-i18n-en="items"></span></span>
      </div>
    </header>
    <div class="list-wrap">
      <p class="empty"><span data-i18n-zh="尚無已發布文章。請先完成待審流程。" data-i18n-en="No published items yet. Complete the review workflow first."></span></p>
    </div>
    <footer class="time"><span data-i18n-zh="更新時間（UTC）·" data-i18n-en="Last update (UTC)·"></span>
      2026-05-17T08:34:18</footer>
  </main>
<script>
(function () {
  var K = "hermers_lang";
  function norm(q) {
    if (q === "en" || q === "en-US") return "en";
    if (q === "zh" || q === "zh-Hant" || q === "zh-TW" || q === "tw") return "zh-Hant";
    return null;
  }
  var sp = new URLSearchParams(location.search).get("lang");
  var n = norm(sp);
  if (n) localStorage.setItem(K, n);

  function apply() {
    var lang = localStorage.getItem(K) || "zh-Hant"; // en | zh-Hant
    document.documentElement.lang = lang === "en" ? "en" : "zh-Hant";
    var zht = document.documentElement.getAttribute("data-hermers-title-zh");
    var ent = document.documentElement.getAttribute("data-hermers-title-en");
    if (zht !== null && ent !== null && zht !== "" && ent !== "") {
      document.title = lang === "en" ? ent : zht;
    }
    document.querySelectorAll("[data-i18n-zh][data-i18n-en]").forEach(function (el) {
      var zh = el.getAttribute("data-i18n-zh") || "";
      var en = el.getAttribute("data-i18n-en") || "";
      el.textContent = lang === "en" ? en : zh;
    });
    document.querySelectorAll(".lang-switch .lang-btn").forEach(function (btn) {
      var v = btn.getAttribute("data-set-lang");
      var on = (v === "en" && lang === "en") || (v === "zh-Hant" && lang !== "en");
      btn.setAttribute("aria-pressed", on ? "true" : "false");
    });
  }

  window.hermersSetLang = function (l) {
    localStorage.setItem(K, l === "en" ? "en" : "zh-Hant");
    apply();
  };

  document.addEventListener("click", function (e) {
    var t = e.target;
    if (!t || !t.getAttribute) return;
    var v = t.getAttribute("data-set-lang");
    if (v === "en" || v === "zh-Hant") {
      e.preventDefault();
      window.hermersSetLang(v);
    }
  });

  apply();
})();
</script>
</body>
</html>
