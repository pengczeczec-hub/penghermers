# Cloudflare Python Worker（pywrangler deploy）
name = "penghermers"
main = "main.py"
compatibility_date = "2026-05-16"
compatibility_flags = ["python_workers"]

# 剪報靜態站：dist/ 上傳為 Assets；Worker 轉交 ASSETS.fetch（見 worker_app.py）
[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = true

# 定時觸發（UTC）；台灣時間 = UTC+8
[triggers]
crons = [
  "0 22 * * *",  # 每天 06:00 台灣 — 美股
  "0 1 * * *",   # 每天 09:00 台灣 — 幣圈
  "30 9 * * *",  # 每天 17:30 台灣 — 台股
]

[env.preview]
name = "penghermers-preview"
